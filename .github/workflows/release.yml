name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        working-directory: ./foundry

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "num=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: foundry/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Bump version in package.json
        run: |
          npm version ${{ steps.version.outputs.num }} --no-git-tag-version
          cd ../client
          npm version ${{ steps.version.outputs.num }} --no-git-tag-version
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json ../client/package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.tag }}"
          git push

      - name: Build release zip
        run: npm run release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          make_latest: true
          files: |
            foundry/package/beavers-ai-assistant.zip
            foundry/package/module.json

  publish-client:
    runs-on: ubuntu-latest
    needs: release

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm publish --provenance --access public