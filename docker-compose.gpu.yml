# Standalone GPU compose for Nvidia users.
# Run with: docker compose -f docker-compose.gpu.yml up -d
#
# Requires:
#   - Nvidia GPU + drivers
#   - NVIDIA Container Toolkit (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html)

services:
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:v1.7.1-gpu
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=${WHISPER_MODEL:-large-v3-turbo}
      - ASR_ENGINE=faster_whisper
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  discord-bot:
    build:
      dockerfile: ./Dockerfile
    env_file: ./discord-bot/.env
    environment:
      - WHISPER_URL=http://host.docker.internal:9000
      - FOUNDRY_URL=http://host.docker.internal:13348
      - WHISPER_TIMEOUT_MS=120000
    depends_on:
      - whisper
