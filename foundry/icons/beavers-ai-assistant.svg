<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <mask id="squareMask">
      <rect width="100" height="100" fill="white"/>
      <rect x="60" y="60" width="36" height="36" fill="black"/>
    </mask>
  </defs>

  <!-- Ring with square notch cut from bottom-right -->
  <path
    d="M50,6 A44,44 0 1,0 50,94 A44,44 0 1,0 50,6 Z M50,22 A38,28 0 1,0 50,78 A38,28 0 1,0 50,22 Z"
    fill="currentColor"
    fill-rule="evenodd"
    mask="url(#squareMask)"/>

  <!-- "AI" badge in the square notch -->
  <text x="76" y="76"
        font-family="Arial, sans-serif" font-weight="bold"
        font-size="28" fill="currentColor"
        text-anchor="middle" dominant-baseline="middle">AI</text>

  <text x="50" y="46"
        font-family="Arial, sans-serif" font-weight="bold"
        font-size="28" fill="currentColor"
        text-anchor="middle" dominant-baseline="middle">...</text>
</svg>