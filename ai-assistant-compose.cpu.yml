# AI Assistant Compose (CPU version)
#
# Run with: docker compose -f ai-assistant-compose.cpu.yml up -d
#
# LocalAI service for the Beavers AI Assistant Foundry module — CPU-only version.
# Runs on the SAME COMPUTER as the GM's Foundry VTT instance.
# Provides local LLM inference via OpenAI-compatible API.

version: '3.8'

services:
  local-ai:
    image: localai/localai:latest
    ports:
      - "8080:8080"
    environment:
      # Model to load on startup (auto-downloads on first run)
      # Use phi-3:mini for CPU — fastest
      - MODEL_NAME=${LOCAL_AI_MODEL:-phi-3:mini}
      # Disable GPU
      - ENABLE_CUDA=false
      # CPU parallelism (adjust to your CPU core count)
      - THREADS=${CPU_THREADS:-4}
    volumes:
      # Persist downloaded models across container restarts
      - local-ai-models:/models
    restart: unless-stopped

volumes:
  local-ai-models:
    driver: local