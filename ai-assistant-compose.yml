# AI Assistant Compose (GPU version — Nvidia)
#
# Run with: docker compose -f ai-assistant-compose.yml up -d
#
# LocalAI service for the Beavers AI Assistant Foundry module.
# Runs on the SAME COMPUTER as the GM's Foundry VTT instance.
# Provides local LLM inference via OpenAI-compatible API.
#

version: '3.8'

services:
  local-ai:
    image: localai/localai:latest-gpu-nvidia-cuda-12
    ports:
      - "8080:8080"
    environment:
      # Enable float16 precision for GPU acceleration
      - LOCALAI_F16=true
      # Disable CSRF middleware so the Foundry module can call the API cross-origin
      - LOCALAI_DISABLE_CSRF=true
    volumes:
      # Persist downloaded models across container restarts
      - local-ai-models:/models
      - local-ai-backends:/backends
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  local-ai-models:
    driver: local
  local-ai-backends:
    driver: local